name: Sync Lemlist Campaigns

on:
  workflow_dispatch:       # manual trigger from GitHub UI only

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger campaign sync
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://kojja.vercel.app/api/campaigns/sync \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
          | grep -q "^2" || exit 1
